<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital - Modelo de Prueba</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Encabezado del Negocio -->
    <header class="header">
        <h1 class="brand-name">Burgers & Co. Yopal</h1>
        <p class="brand-slogan">¡Pide tus domicilios en 2 clics!</p>
    </header>

    <!-- Contenedor del Catálogo -->
    <main class="catalog-container">
        
        <!-- Producto 1 -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Hamburguesa Especial" class="product-img">
            <div class="product-info">
                <h3 class="product-title">Hamburguesa Especial</h3>
                <p class="product-desc">Carne artesanal, queso cheddar, tocineta crujiente y salsa de la casa. Incluye papas.</p>
                <div class="product-footer">
                    <span class="product-price">$22.000</span>
                    <button class="btn-order" onclick="enviarPedido('Hamburguesa Especial', '$22.000')">Pedir por WhatsApp</button>
                </div>
            </div>
        </div>

        <!-- Producto 2 -->
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="Pizza Personal" class="product-img">
            <div class="product-info">
                <h3 class="product-title">Pizza Hawaiana Personal</h3>
                <p class="product-desc">Masa delgada, doble porción de jamón, piña calada y mucho queso mozzarella.</p>
                <div class="product-footer">
                    <span class="product-price">$18.000</span>
                    <button class="btn-order" onclick="enviarPedido('Pizza Hawaiana Personal', '$18.000')">Pedir por WhatsApp</button>
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
